<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quick Commands</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 360px;
        min-height: 180px;
        background: #1e1e2e;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #cdd6f4;
        padding: 16px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        font-size: 13px;
        line-height: 1.5;
        color: rgba(205, 214, 244, 0.85);
        margin-bottom: 12px;
      }
      button {
        width: 100%;
        border: 1px solid rgba(137, 180, 250, 0.45);
        background: rgba(137, 180, 250, 0.2);
        color: #cdd6f4;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        background: rgba(137, 180, 250, 0.28);
      }
      button:focus-visible {
        outline: 2px solid #89b4fa;
        outline-offset: 2px;
      }
      #status {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        color: rgba(205, 214, 244, 0.78);
      }
    </style>
  </head>
  <body>
    <h1>Quick Commands</h1>
    <p>
      This page is restricted by Firefox. Open Quick Commands in your most
      recent normal tab.
    </p>
    <button id="open-on-tab" type="button">Open In Last Normal Tab</button>
    <div id="status" role="status" aria-live="polite"></div>
    <script src="popup.js"></script>
  </body>
</html>
