<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Commands Settings</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: 1.45;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        max-width: 720px;
      }

      fieldset {
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 10px;
        padding: 14px;
        max-width: 720px;
      }

      legend {
        font-weight: 700;
        padding: 0 6px;
      }

      .setting-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
      }

      .hint {
        margin-top: 12px;
        opacity: 0.8;
        font-size: 13px;
      }

      #status {
        margin-top: 12px;
        min-height: 20px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>Quick Commands Settings</h1>
    <p>
      Choose which sources appear in search results. Changes are saved
      automatically.
    </p>

    <fieldset>
      <legend>Search Sources</legend>

      <label class="setting-row">
        <input id="searchTabs" type="checkbox" />
        <span>Tabs</span>
      </label>

      <label class="setting-row">
        <input id="searchClosedTabs" type="checkbox" />
        <span>Recently Closed Tabs</span>
      </label>

      <label class="setting-row">
        <input id="searchBookmarks" type="checkbox" />
        <span>Bookmarks</span>
      </label>

      <label class="setting-row">
        <input id="searchCommands" type="checkbox" />
        <span>Commands</span>
      </label>

      <label class="setting-row">
        <input id="searchHistory" type="checkbox" />
        <span>History</span>
      </label>

      <p class="hint">
        If all sources are turned off, Quick Commands will show no results.
      </p>
    </fieldset>

    <div id="status" role="status" aria-live="polite"></div>

    <script src="options.js"></script>
  </body>
</html>
